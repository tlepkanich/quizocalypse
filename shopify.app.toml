# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "f3734ef453742fe039d91aed5cbc4da3"
application_url = "https://quizocalypse-studio.fly.dev"
embedded = true
name = "quizocalypse"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_inventory,read_orders,read_products,read_themes,write_discounts"

[auth]
redirect_urls = [
  "https://quizocalypse-studio.fly.dev/auth/callback",
  "https://quizocalypse-studio.fly.dev/auth/shopify/callback",
  "https://quizocalypse-studio.fly.dev/api/auth/callback"
]

[webhooks]
api_version = "2026-07"

  # Conversion attribution: flip QuizSession.converted when a shopper purchases
  # after taking a quiz. Handler: app/routes/webhooks.orders.create.tsx.
  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  # X6 (§N) — MANDATORY GDPR/CCPA compliance webhooks (App-Store-blocking).
  # Handlers: app/routes/webhooks.customers.data_request|redact + shop.redact.
  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/data_request" ]
  uri = "/webhooks/customers/data_request"

  [[webhooks.subscriptions]]
  compliance_topics = [ "customers/redact" ]
  uri = "/webhooks/customers/redact"

  [[webhooks.subscriptions]]
  compliance_topics = [ "shop/redact" ]
  uri = "/webhooks/shop/redact"

[build]
# Pinned to the stable Fly URL above. Keep false so `shopify app dev` can't
# overwrite application_url with an ephemeral tunnel — that is exactly what
# left the standalone connector pointing at a dead tunnel. Flip back to true
# only if you resume local embedded dev.
automatically_update_urls_on_dev = false
